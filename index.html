<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sama Support System</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #1a1a1a, #2b0f3a);
  color: white;
  overflow: hidden;
}

/* INTRO PAGE */
#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  animation: fadeIn 1.5s ease forwards;
}

#intro h1 {
  font-size: 32px;
  background: linear-gradient(90deg, #ff4ecd, #7a5cff);
  -webkit-background-clip: text;
  color: transparent;
  animation: glow 2s infinite alternate;
}

.traits p {
  margin: 8px 0;
  transition: 0.3s;
}

.traits p:hover {
  color: #ff4ecd;
  transform: scale(1.05);
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  background: #7a5cff;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4ecd;
  transform: scale(1.05);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ff4ecd; }
  to { text-shadow: 0 0 20px #7a5cff; }
}

/* CHAT PAGE */
#chatPage {
  display: none;
  flex-direction: column;
  height: 100vh;
  background: #000;
}

.header {
  display: flex;
  align-items: center;
  padding: 10px;
  background: #111;
  border-bottom: 1px solid #333;
}

.back {
  font-size: 22px;
  margin-right: 10px;
  cursor: pointer;
}

.header img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  margin-right: 10px;
}

.chatBox {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.messageRow {
  display: flex;
  align-items: flex-end;
  margin: 5px 0;
}

.messageRow.sama {
  justify-content: flex-start;
}

.messageRow.user {
  justify-content: flex-end;
}

.bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
}

.samaBubble {
  background: #262626;
}

.userBubble {
  background: #3797f0;
}

.pfp {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  margin-right: 6px;
}

.inputArea {
  display: flex;
  padding: 10px;
  background: #111;
  border-top: 1px solid #333;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

.sendBtn {
  margin-left: 10px;
  padding: 10px 16px;
  border-radius: 20px;
  background: #3797f0;
}

.systemMsg {
  text-align: center;
  color: grey;
  font-size: 13px;
  margin: 10px 0;
}

</style>
</head>

<body>

<div id="intro">
  <h1>Bro Appreciation Portal</h1>
  <div class="traits">
    <p>✔ ABSOLUTELY Loyal</p>
    <p>✔ Dramatic hehehe</p>
    <p>✔ Emotionally invested :00</p>
    <p>✔ Top-tier homie</p>
  </div>
  <button onclick="openSimulator()">dont click</button>
</div>

<div id="chatPage">
  <div class="header">
    <div class="back" onclick="goBack()">←</div>
    <img src="sama.jpg">
    <div>sama</div>
  </div>

  <div class="chatBox" id="chatBox"></div>

  <div class="inputArea">
    <input id="userInput" placeholder="Message...">
    <button class="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const samaMessages = [
  "heyyyy how you doinggg",
  "howww are youuu? whatre u uptoo??",
  "heyy, just saying, dont overthink anything okayy?",
  "i appreciate you more than you think.",
  "weird to say but you matter a lott to me 😭",
  "you are special to me even if i dont show it okay..",
  "Okay I gotta go lol bye"
];

let msgIndex = 0;
let abandonedCount = 0;
let ended = false;
let waitingForReply = false;

function openSimulator() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("chatPage").style.display = "flex";
  sendSamaMessage();
}

function goBack() {
  location.reload();
}

function sendSamaMessage() {
  if (msgIndex >= samaMessages.length) {
    ended = true;
    waitingForReply = false;
    return;
  }

  waitingForReply = true;

  const chat = document.getElementById("chatBox");

  const typing = document.createElement("div");
  typing.className = "systemMsg";
  typing.id = "typingIndicator";
  typing.textContent = "sama is typing...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {
    typing.remove();

    const row = document.createElement("div");
    row.className = "messageRow sama";

    const img = document.createElement("img");
    img.src = "sama.jpg";
    img.className = "pfp";

    const bubble = document.createElement("div");
    bubble.className = "bubble samaBubble";
    bubble.textContent = samaMessages[msgIndex];

    row.appendChild(img);
    row.appendChild(bubble);
    chat.appendChild(row);

    chat.scrollTop = chat.scrollHeight;

    msgIndex++;
    waitingForReply = false;

    if (msgIndex >= samaMessages.length) {
      ended = true;
    }
  }, 1500);
}

function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  const chat = document.getElementById("chatBox");

  const row = document.createElement("div");
  row.className = "messageRow user";

  const bubble = document.createElement("div");
  bubble.className = "bubble userBubble";
  bubble.textContent = text;

  row.appendChild(bubble);
  chat.appendChild(row);

  const oldSeen = document.getElementById("seenLabel");
  if (oldSeen) oldSeen.remove();

  const seen = document.createElement("div");
  seen.className = "systemMsg";
  seen.id = "seenLabel";
  seen.textContent = "Seen";
  chat.appendChild(seen);

  chat.scrollTop = chat.scrollHeight;
  input.value = "";

  if (!ended && !waitingForReply) {
    sendSamaMessage();
  }

  if (ended) {
    abandonedCount++;
    if (abandonedCount === 3) {
      const sys = document.createElement("div");
      sys.className = "systemMsg";
      sys.textContent = "im sorry bro";
      chat.appendChild(sys);
      chat.scrollTop = chat.scrollHeight;
    }
  }
}

document.getElementById("userInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
