<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bro Appreciation Portal</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #000);
    color: white;
  }

  .center {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
  }

  .traits p {
    margin: 6px 0;
    font-size: 18px;
    transition: color 0.3s ease;
  }

  .traits p:hover {
    color: #3797f0;
  }

  button {
    margin-top: 20px;
    padding: 12px 22px;
    font-size: 16px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    background: #3797f0;
    color: white;
    transition: transform 0.2s ease, background 0.3s ease;
  }

  button:hover {
    transform: scale(1.05);
    background: #4aa3ff;
  }

  .chat-page {
    display: none;
    height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
  }

  .chat-header {
    background: #111;
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #222;
  }

  .chat-header img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
  }

  .chat-header span {
    font-weight: bold;
  }

  .chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .message-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .left {
    justify-content: flex-start;
  }

  .right {
    justify-content: flex-end;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    max-width: 65%;
    font-size: 14px;
  }

  .sama {
    background: #262626;
  }

  .user {
    background: #3797f0;
  }

  .system {
    align-self: center;
    font-size: 12px;
    color: grey;
  }

  .chat-input {
    display: flex;
    padding: 10px;
    border-top: 1px solid #222;
    background: #111;
  }

  .chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
  }

  .chat-input button {
    margin-left: 10px;
    border-radius: 20px;
  }
</style>
</head>
<body>

<div class="center" id="home">
  <h1>Bro Appreciation Portal</h1>
  <div class="traits">
      <p>✔ ABSOLUTELY Loyal</p>
      <p>✔ Dramatic hehehe</p>
      <p>✔ Emotionally invested :00</p>
      <p>✔ Top-tier homie</p>
  </div>
  <button onclick="openChat()">dont click</button>
</div>

<div class="chat-page" id="chatPage">
  <div class="chat-header">
    <img src="file_00000000484c720ba4ca0becfe91d90e" alt="pfp">
    <span>sama</span>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const replies = [
    "heyyyy how you doinggg",
    "howww are youuu? whatre u uptoo??",
    "heyy, just saying, dont overthink anything okayy?",
    "i appreciate you more than you think.",
    "weird to say but you matter a lott to me 😭",
    "you are special to me even if i dont show it okay..",
    "Okay I gotta go lol bye"
  ];

  let replyIndex = 0;
  let samaGone = false;
  let postGoneCount = 0;

  function openChat() {
    document.getElementById('home').style.display = 'none';
    document.getElementById('chatPage').style.display = 'flex';
    setTimeout(sendSamaMessage, 500);
  }

  function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    addUserMessage(text);
    input.value = '';

    if (!samaGone) {
      setTimeout(sendSamaMessage, 700);
    } else {
      postGoneCount++;
      if (postGoneCount === 3) {
        const sys = document.createElement('div');
        sys.className = 'system';
        sys.innerText = 'im sorry bro';
        document.getElementById('chatBox').appendChild(sys);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
      }
    }
  }

  function sendSamaMessage() {
    if (replyIndex < replies.length) {
      addSamaMessage(replies[replyIndex]);
      if (replies[replyIndex] === "Okay I gotta go lol bye") {
        samaGone = true;
      }
      replyIndex++;
    }
  }

  function addSamaMessage(text) {
    const row = document.createElement('div');
    row.className = 'message-row left';

    const img = document.createElement('img');
    img.src = 'file_00000000484c720ba4ca0becfe91d90e';
    img.style.width = '28px';
    img.style.height = '28px';
    img.style.borderRadius = '50%';

    const bubble = document.createElement('div');
    bubble.className = 'bubble sama';
    bubble.innerText = text;

    row.appendChild(img);
    row.appendChild(bubble);

    document.getElementById('chatBox').appendChild(row);
    document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
  }

  function addUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'message-row right';

    const bubble = document.createElement('div');
    bubble.className = 'bubble user';
    bubble.innerText = text;

    row.appendChild(bubble);

    document.getElementById('chatBox').appendChild(row);
    document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
  }
</script>

</body>
</
