<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bro Appreciation Portal™</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(-45deg, #1e1e2f, #2c2c54, #3b3b98, #1e3799);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 95%;
      max-width: 420px;
      z-index: 2;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 15px;
      animation: textColorShift 4s linear infinite;
    }

    @keyframes textColorShift {
      0% { color: #ff6b81; }
      25% { color: #70a1ff; }
      50% { color: #7bed9f; }
      75% { color: #ffa502; }
      100% { color: #ff6b81; }
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background: #ff6b81;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button:active {
      transform: scale(0.96);
    }

    .hidden { display: none; }

    /* Fake chat UI */
    .chat {
      background: #0f0f1a;
      border-radius: 15px;
      padding: 15px;
      height: 400px;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      text-align: left;
      margin-bottom: 10px;
    }

    .msg {
      padding: 8px 12px;
      border-radius: 15px;
      margin-bottom: 8px;
      max-width: 75%;
      font-size: 14px;
    }

    .her {
      background: #26263a;
      align-self: flex-start;
    }

    .you {
      background: #ff6b81;
      align-self: flex-end;
    }

    .inputRow {
      display: flex;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 8px;
      border-radius: 20px;
      border: none;
    }

    .disclaimer {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="container" id="mainPage">
    <h1>Bro Appreciation Portal™</h1>

    <div class="card">
      <p><strong>Official Stats:</strong></p>
      <p>✔ Loyal</p>
      <p>✔ Dramatic</p>
      <p>✔ Emotionally invested</p>
      <p>✔ Top-tier homie</p>
    </div>

    <button onclick="openSimulator()">Open Sama Support Simulator</button>
  </div>

  <div class="container hidden" id="chatPage">
    <h1>Sama Support Simulator™</h1>

    <div class="chat">
      <div class="messages" id="messages"></div>

      <div class="inputRow">
        <input type="text" id="userInput" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <div class="disclaimer">
      Parody simulator for fun. Not a real chat.
    </div>

    <button onclick="goBack()">Back</button>
  </div>

  <script>
    const replies = [
      "heyyyy how you doinggg"
      "howww are youuu? whatre u uptoo??"
      "heyy, just saying, dont overthink anything okayy?",
      "i appreciate you more than you think.",
      "weird to say but you matter a lott to me 😭",
      "you are special to me even if i dont show it okay.."
      "Okay I gotta go lol bye"
    ];

    let replyIndex = 0;

    function openSimulator() {
      document.getElementById("mainPage").classList.add("hidden");
      document.getElementById("chatPage").classList.remove("hidden");
      addHerMessage("Heyyy");
    }

    function goBack() {
      document.getElementById("chatPage").classList.add("hidden");
      document.getElementById("mainPage").classList.remove("hidden");
    }

    function addHerMessage(text) {
      const msg = document.createElement("div");
      msg.className = "msg her";
      msg.innerText = text;
      document.getElementById("messages").appendChild(msg);
      scrollDown();
    }

    function addYourMessage(text) {
      const msg = document.createElement("div");
      msg.className = "msg you";
      msg.innerText = text;
      document.getElementById("messages").appendChild(msg);
      scrollDown();
    }

    function sendMessage() {
      const input = document.getElementById("userInput");
      if (!input.value.trim()) return;

      addYourMessage(input.value);
      input.value = "";

      setTimeout(() => {
        if (replyIndex < replies.length) {
          addHerMessage(replies[replyIndex]);
          replyIndex++;
        }
      }, 800);
    }

    function scrollDown() {
      const messages = document.getElementById("messages");
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
